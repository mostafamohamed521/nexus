{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:var(--sp-8)">
  <div>
    <div style="font-family:var(--font-display);font-size:8rem;font-weight:800;color:var(--clr-accent);line-height:1;margin-bottom:var(--sp-4)">404</div>
    <h1 style="font-size:var(--text-3xl);margin-bottom:var(--sp-4)">Page not found</h1>
    <p style="color:var(--clr-text-muted);margin-bottom:var(--sp-8);max-width:400px;margin-left:auto;margin-right:auto">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary btn-lg">← Back to home</a>
  </div>
</div>
{% endblock %}
